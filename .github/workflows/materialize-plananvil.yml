name: Materialize PlanAnvil implementation

on:
  push:
    branches:
      - agent/implement-plananvil-skill

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/implement-plananvil-skill
      - name: Diagnose archive fragments
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            .bootstrap/part-00 \
            .bootstrap/fix-01-00 \
            .bootstrap/fix-01-01 \
            .bootstrap/fix-01-02 \
            .bootstrap/fix-01-03 \
            .bootstrap/fix-01-04 \
            .bootstrap/fix-01-05 \
            .bootstrap/part-02 \
            .bootstrap/part-03 \
            .bootstrap/fix-04-00 \
            .bootstrap/fix-04-01 \
            .bootstrap/part-05 \
            .bootstrap/part-06 \
            .bootstrap/part-07 \
            .bootstrap/part-08 \
            .bootstrap/part-09 \
            .bootstrap/part-10 \
            .bootstrap/part-11 \
            .bootstrap/part-12 \
            > .bootstrap/diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bootstrap/diagnostic.txt
          git commit -m "Record PlanAnvil fragment diagnostics"
          git push origin HEAD:agent/implement-plananvil-skill
